; ================================================================================
; platformio_override.ini — dpx_tc002 / Ulanzi TC001 Build Config
; ================================================================================
; Ulanzi TC001 hardware:
;   ESP32-WROOM-32D · 240MHz · 4MB flash · CH340 USB-serial
;   LED matrix: GPIO32, 256× WS2812B, 32×8 rows, row-major
;   LDR: GPIO35   I²C: GPIO21/22   Buttons: GPIO26/27/14
;
; Usage:
;   pio run -e ulanzi_tc001          # build only
;   pio run -e ulanzi_tc001 -t upload  # build + flash
;
; First time:
;   npm ci && npm run build          # generate html_*.h headers
;   pio run -e ulanzi_tc001
; ================================================================================

[env:ulanzi_tc001]
extends = env:esp32dev

; ── Hardware ──────────────────────────────────────────────────────────────────
board                  = esp32dev
board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
upload_speed           = 460800

; ── Custom usermod ────────────────────────────────────────────────────────────
custom_usermods = dpx_matrix

; ── Compile-time flags ────────────────────────────────────────────────────────
build_flags =
  ${env:esp32dev.build_flags}

  ; ── Disable unused WLED features to save flash ──────────────────────────
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_ESPNOW

  ; ── Ulanzi TC001 hardware pin defaults ─────────────────────────────────
  ; These are compile-time defaults. The user can override via WLED web UI.
  -D LEDPIN=32
  -D BTNPIN=26
  -D RLYPIN=-1
  -D IRPIN=-1
  -D STATUSPIN=-1

  ; ── LittleFS instead of SPIFFS ─────────────────────────────────────────
  -D WLED_USE_LITTLEFS

  ; ── Product identification ─────────────────────────────────────────────
  -D WLED_VERSION='"dpx_tc002-dev"'
  -D WLED_PRODUCT_NAME='"dpx_tc002"'
  -D WLED_INSTANCE_NAME='"dpx_tc002"'

; ── Custom partition table (1.75MB app + 256KB LittleFS) ─────────────────────
; board_build.partitions = tools/TC001_partitions.csv
; Uncomment the line above once the custom partition table is added.
; For now, uses esp32dev default (1.25MB app).

; ── Monitor ───────────────────────────────────────────────────────────────────
monitor_speed          = 115200
monitor_filters        = esp32_exception_decoder
