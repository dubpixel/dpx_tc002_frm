; ================================================================================
; platformio_override.ini — dpx_tc002 / Ulanzi TC001 Build Config
; ================================================================================
; Ulanzi TC001 hardware:
;   ESP32-WROOM-32D · 240MHz · 4MB flash · CH340 USB-serial
;   LED matrix: GPIO32, 256× WS2812B, 32×8 rows, row-major
;   LDR: GPIO35   I²C: GPIO21/22   Buttons: GPIO26/27/14
;
; Usage:
;   pio run -e ulanzi_tc001          # build + flash via USB
;   pio run -e ulanzi_tc001_ota      # build + flash via WiFi OTA
; ================================================================================

[platformio]
default_envs = ulanzi_tc001

; ── Shared hardware + build flags ─────────────────────────────────────────────
[dpx_tc001_common]
board                  = esp32dev
board_build.mcu        = esp32
board_build.f_cpu      = 240000000L
custom_usermods        = dpx_matrix
build_flags =
  ${env:esp32dev.build_flags}
  -D WLED_DISABLE_ALEXA
  -D WLED_DISABLE_LOXONE
  -D WLED_DISABLE_INFRARED
  -D WLED_DISABLE_HUESYNC
  -D WLED_DISABLE_ADALIGHT
  -D WLED_DISABLE_ESPNOW
  -D LEDPIN=32
  -D DEFAULT_LED_COUNT=256
  -D BTNPIN=26
  -D RLYPIN=-1
  -D IRPIN=-1
  -D STATUSPIN=-1
  -D DPX_BTN_LEFT=26
  -D DPX_BTN_MID=14
  -D DPX_BTN_RIGHT=27
  -D WLED_USE_LITTLEFS
  -D WLED_NTP_ENABLED=true
  -D WLED_VERSION='"dpx_tc002-dev"'
  -D WLED_PRODUCT_NAME='"dpx_tc002"'
  -D WLED_INSTANCE_NAME='"dpx_tc002"'
monitor_speed          = 115200
monitor_filters        = esp32_exception_decoder

; ── USB flash ─────────────────────────────────────────────────────────────────
[env:ulanzi_tc001]
extends            = env:esp32dev
board              = ${dpx_tc001_common.board}
board_build.mcu    = ${dpx_tc001_common.board_build.mcu}
board_build.f_cpu  = ${dpx_tc001_common.board_build.f_cpu}
custom_usermods    = ${dpx_tc001_common.custom_usermods}
build_flags        = ${dpx_tc001_common.build_flags}
monitor_speed      = ${dpx_tc001_common.monitor_speed}
monitor_filters    = ${dpx_tc001_common.monitor_filters}
upload_speed       = 460800

; ── OTA / WiFi flash ──────────────────────────────────────────────────────────
; OTA password: WLED → Config → Security & Updates (leave blank if unset)
[env:ulanzi_tc001_ota]
extends            = env:esp32dev
board              = ${dpx_tc001_common.board}
board_build.mcu    = ${dpx_tc001_common.board_build.mcu}
board_build.f_cpu  = ${dpx_tc001_common.board_build.f_cpu}
custom_usermods    = ${dpx_tc001_common.custom_usermods}
build_flags        = ${dpx_tc001_common.build_flags}
monitor_speed      = ${dpx_tc001_common.monitor_speed}
monitor_filters    = ${dpx_tc001_common.monitor_filters}
upload_protocol    = espota
upload_port        = 10.10.11.200
; upload_flags     = --auth=wledota
